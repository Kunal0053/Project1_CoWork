<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoWork - Find Services</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #F97316;
  --primary-dark: #EA580C;
  --dark: #111827;
  --gray-900: #0F172A;
  --gray-800: #1F2937;
  --gray-700: #374151;
  --gray-500: #6B7280;
  --gray-400: #9CA3AF;
  --gray-100: #F3F4F6;
  --white: #FFFFFF;
  --green: #10B981;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--gray-900);
  color: var(--white);
  min-height: 100vh;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 60px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--primary); }

.nav-right { display: flex; align-items: center; gap: 16px; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--gray-400);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--white); }

/* HERO BANNER */
.banner {
  background: linear-gradient(135deg, #1a0a00 0%, #2d1200 40%, #1F2937 100%);
  padding: 56px 60px 48px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.banner::after {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
  pointer-events: none;
}

.banner-content { max-width: 600px; position: relative; z-index: 1; }

.banner h1 {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 10px;
}

.banner h1 span { color: var(--primary); }

.banner p {
  color: var(--gray-400);
  font-size: 15px;
  margin-bottom: 28px;
}

/* SEARCH BAR */
.search-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  background: var(--gray-800);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 8px 8px 8px 20px;
  max-width: 560px;
}

.search-bar select {
  flex: 1;
  background: none;
  border: none;
  color: var(--white);
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  cursor: pointer;
}

.search-bar select option {
  background: var(--gray-800);
  color: var(--white);
}

.search-btn {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-btn:hover { background: var(--primary-dark); }

/* CATEGORY PILLS */
.categories {
  padding: 24px 60px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.pill {
  padding: 8px 18px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 13px;
  font-weight: 500;
  color: var(--gray-400);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  font-family: 'Inter', sans-serif;
}

.pill:hover, .pill.active {
  background: rgba(249,115,22,0.1);
  border-color: rgba(249,115,22,0.4);
  color: var(--primary);
}

/* MAIN CONTENT */
.main {
  padding: 32px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

@media(max-width: 768px) {
  nav { padding: 16px 20px; }
  .banner { padding: 40px 20px 32px; }
  .banner h1 { font-size: 26px; }
  .categories { padding: 16px 20px; }
  .main { padding: 24px 20px; }
  .search-bar { flex-wrap: wrap; }
}

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.results-title {
  font-size: 18px;
  font-weight: 700;
}

.results-count {
  font-size: 13px;
  color: var(--gray-400);
}

/* STATE */
.state-box {
  text-align: center;
  padding: 72px 32px;
  color: var(--gray-500);
}

.state-icon { font-size: 52px; margin-bottom: 16px; }

.state-box h3 { font-size: 18px; font-weight: 600; color: var(--gray-400); margin-bottom: 8px; }

.state-box p { font-size: 14px; }

/* LOADING */
.loading {
  display: flex;
  gap: 12px;
  flex-direction: column;
}

.skeleton {
  height: 120px;
  background: linear-gradient(90deg, var(--gray-800) 25%, var(--gray-700) 50%, var(--gray-800) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 16px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* WORKER CARDS */
.workers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.worker-card {
  background: var(--gray-800);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  padding: 20px;
  display: flex;
  gap: 16px;
  transition: all 0.25s;
  cursor: default;
}

.worker-card:hover {
  border-color: rgba(249,115,22,0.25);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
}

.worker-avatar {
  width: 72px;
  height: 72px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--gray-700);
}

.worker-body { flex: 1; min-width: 0; }

.worker-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--gray-400);
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.meta-dot { width: 3px; height: 3px; background: var(--gray-500); border-radius: 50%; }

.worker-rating {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(16,185,129,0.12);
  color: var(--green);
  font-size: 12px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 100px;
}

.worker-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.book-btn {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
}

.book-btn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
}

.book-btn:disabled {
  background: var(--gray-700);
  color: var(--gray-500);
  cursor: not-allowed;
  transform: none;
}

.earnings-badge {
  font-size: 12px;
  color: var(--gray-400);
}

.earnings-badge strong {
  color: var(--white);
  font-weight: 600;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: white;
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(16,185,129,0.35);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.3s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body>

<nav>
  <div class="logo">Co<span>Work</span></div>
  <div class="nav-right">
    <a href="home.html" class="back-btn">← Home</a>
  </div>
</nav>

<div class="banner">
  <div class="banner-content">
    <h1>Find <span>verified</span> professionals</h1>
    <p>Book skilled workers near you — fast, trusted & affordable</p>
    <div class="search-bar">
      <select id="serviceType">
        <option value="electrician">⚡ Electrician</option>
        <option value="plumber">🔧 Plumber</option>
        <option value="cobbler">👟 Cobbler</option>
        <option value="carpenter">🪑 Carpenter</option>
        <option value="mechanic">🔩 Mechanic</option>
      </select>
      <button class="search-btn" onclick="searchWorkers()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </button>
    </div>
  </div>
</div>

<div class="categories">
  <button class="pill active" onclick="selectCategory('electrician', this)">⚡ Electrician</button>
  <button class="pill" onclick="selectCategory('plumber', this)">🔧 Plumber</button>
  <button class="pill" onclick="selectCategory('cobbler', this)">👟 Cobbler</button>
  <button class="pill" onclick="selectCategory('carpenter', this)">🪑 Carpenter</button>
  <button class="pill" onclick="selectCategory('mechanic', this)">🔩 Mechanic</button>
</div>

<div class="main">
  <div class="results-header">
    <div class="results-title" id="results-title">Search for a service above</div>
    <div class="results-count" id="results-count"></div>
  </div>
  <div id="results">
    <div class="state-box">
      <div class="state-icon">🔍</div>
      <h3>Find a professional</h3>
      <p>Select a service category and tap Search to see available workers</p>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Booking confirmed!</div>

<script>
function selectCategory(val, el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('serviceType').value = val;
  searchWorkers();
}

async function searchWorkers() {
  const type = document.getElementById('serviceType').value;
  const results = document.getElementById('results');
  const title = document.getElementById('results-title');
  const count = document.getElementById('results-count');

  const labels = {
    electrician: '⚡ Electricians',
    plumber: '🔧 Plumbers',
    cobbler: '👟 Cobblers',
    carpenter: '🪑 Carpenters',
    mechanic: '🔩 Mechanics'
  };

  results.innerHTML = `
    <div class="loading">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  `;
  title.textContent = labels[type] || 'Workers';
  count.textContent = '';

  try {
    const res = await fetch(`https://co-work-zpsh.onrender.com/workers/${type}`);
    const data = await res.json();

    if (data.length === 0) {
      results.innerHTML = `
        <div class="state-box">
          <div class="state-icon">😔</div>
          <h3>No workers available</h3>
          <p>There are no approved ${type}s at the moment. Try another category.</p>
        </div>
      `;
      count.textContent = '0 found';
      return;
    }

    count.textContent = `${data.length} available`;

    results.innerHTML = `<div class="workers-grid" id="grid"></div>`;
    const grid = document.getElementById('grid');

    data.forEach(w => {
      const div = document.createElement('div');
      div.className = 'worker-card';
      div.innerHTML = `
        <img class="worker-avatar" src="${w.photo ? '/uploads/' + w.photo : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(w.name) + '&background=374151&color=fff&size=72&bold=true'}" alt="${w.name}">
        <div class="worker-body">
          <div class="worker-name">${w.name}</div>
          <div class="worker-meta">
            <span>${w.skill.charAt(0).toUpperCase() + w.skill.slice(1)}</span>
            <span class="meta-dot"></span>
            <span>📍 ${w.location}</span>
            ${w.rating > 0 ? `<span class="worker-rating">★ ${w.rating}</span>` : ''}
          </div>
          <div class="worker-footer">
            <div class="earnings-badge">Gigs: <strong>${w.gigs || 0}</strong></div>
            <button class="book-btn" onclick="bookWorker('${w.name}','${w.skill}','${w.location}', this)">Book Now</button>
          </div>
        </div>
      `;
      grid.appendChild(div);
    });

  } catch {
    results.innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <h3>Something went wrong</h3>
        <p>Could not load workers. Please try again.</p>
      </div>
    `;
  }
}

async function bookWorker(name, skill, location, btn) {
  btn.disabled = true;
  btn.textContent = 'Booking...';

  try {
    await fetch('https://co-work-zpsh.onrender.com/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ workerName: name, skill, location })
    });

    btn.textContent = '✓ Booked!';
    btn.style.background = '#10B981';

    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);

  } catch {
    btn.textContent = 'Failed';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
